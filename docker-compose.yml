services:
  app:
    image: php:8.4-cli
    container_name: sitetatrend_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: sitetatrend
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        apt-get update -q &&
        apt-get install -y -q unzip curl libpq-dev &&
        docker-php-ext-install pdo pdo_pgsql &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        composer install --no-interaction --prefer-dist &&
        php artisan migrate --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: sitetatrend_db
    environment:
      POSTGRES_DB: sitetatrend
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d sitetatrend"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata: